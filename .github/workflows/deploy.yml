name: Continuous Deployment

on:
  push:
    branches:
      - main # 當你 push 到 main 分支時觸發

jobs:
  update:
    name: Expo Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: ⚙️ Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🚀 Publish Update
        run: eas update --branch production --message "Auto-deployed from GitHub Actions"
